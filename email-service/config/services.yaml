parameters:
    app.language_detector_url: '%env(LANGUAGE_DETECTOR_URL)%'
    app.ollama_url: '%env(OLLAMA_URL)%'
    app.ollama_model: '%env(OLLAMA_MODEL)%'
    app.ollama_temperature_incident: '%env(float:OLLAMA_TEMPERATURE_INCIDENT)%'
    app.ollama_temperature_emotions: '%env(float:OLLAMA_TEMPERATURE_EMOTIONS)%'
    app.language_detector_confidence_threshold: '%env(float:LANGUAGE_DETECTOR_CONFIDENCE_THRESHOLD)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    App\Services\LanguageDetector\LanguageDetectorFastText:
        arguments:
            $baseUrl: '%app.language_detector_url%'
            $confidenceThreshold: '%app.language_detector_confidence_threshold%'

    App\Services\LLMExtractor\OllamaLLMExtractor:
        arguments:
            $baseUrl: '%app.ollama_url%'
            $model: '%app.ollama_model%'
            $temperatureIncident: '%app.ollama_temperature_incident%'
            $temperatureEmotions: '%app.ollama_temperature_emotions%'

    App\EventListener\ExceptionListener:
        arguments:
            $appEnv: '%kernel.environment%'

    App\Services\LanguageDetector\LanguageDetector: '@App\Services\LanguageDetector\LanguageDetectorFastText'
    App\Services\LLMExtractor\LLMExtractor: '@App\Services\LLMExtractor\OllamaLLMExtractor'
    App\Services\ContextBuilder\Repository\CandidateLocationRepository: '@App\Services\ContextBuilder\Repository\InMemoryCandidateLocationRepository'
    App\Services\ContextBuilder\Repository\CandidateDeviceRepository: '@App\Services\ContextBuilder\Repository\InMemoryCandidateDeviceRepository'
    App\Services\ContextBuilder\Repository\SimilarIncidentRepository: '@App\Services\ContextBuilder\Repository\InMemorySimilarIncidentRepository'
